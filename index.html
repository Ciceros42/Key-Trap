<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key Trap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Consolas', monospace;
      color: #fff;
      overflow: hidden;
      user-select: none;
      transition: background-color 1s ease;
    }

    /* ── HUD ── */
    #ui {
      display: flex;
      gap: 36px;
      margin-bottom: 28px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #555;
      text-transform: uppercase;
    }
    #ui .hud-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    #ui .value { color: #fff; font-size: 22px; letter-spacing: 1px; transition: color 0.3s; }
    #reset-best {
      background: none; border: 1px solid #2a2a2a; border-radius: 4px;
      color: #444; font-size: 10px; padding: 2px 5px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      line-height: 1;
    }
    #reset-best:hover { color: #ff4444; border-color: #ff4444; }

    @keyframes hud-score-flash {
      0%   { color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.9); transform: scale(1.15); }
      100% { color: #fff; text-shadow: none; transform: scale(1); }
    }
    .hud-score-flash { animation: hud-score-flash 0.4s ease-out forwards; }

    @keyframes hud-tier-pop {
      0%   { transform: scale(1.4); }
      60%  { transform: scale(0.95); }
      100% { transform: scale(1); }
    }
    .hud-tier-pop { animation: hud-tier-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* ── Grid ── */
    #grid-container {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      padding: 20px;
      background: #111;
      border-radius: 16px;
      border: 1px solid #1a1a1a;
      box-shadow: 0 0 80px rgba(0,0,0,0.9);
      transition: box-shadow 1s ease, border-color 1s ease;
    }

    /* ── Key Square ── */
    .key-square {
      width: 80px;
      height: 80px;
      background: #2a2a2a;
      border-radius: 10px;
      border: 2px solid #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: #aaa;
      cursor: default;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, color 0.15s ease;
      position: relative;
      box-shadow: 0 4px 0 #0a0a0a, 0 6px 16px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    .key-square .key-label { position: relative; z-index: 1; }

    /* Cursor */
    .key-square.cursor {
      background: #003d4d;
      border-color: #00e5ff;
      border-width: 3px;
      color: #00e5ff;
      box-shadow: 0 0 0 4px rgba(0,229,255,0.35), 0 0 28px rgba(0,229,255,0.65), 0 0 60px rgba(0,229,255,0.2), 0 4px 0 #001a22;
      animation: cursor-pulse 1s ease-in-out infinite alternate;
    }
    @keyframes cursor-pulse {
      from { box-shadow: 0 0 0 4px rgba(0,229,255,0.3), 0 0 20px rgba(0,229,255,0.5), 0 4px 0 #001a22; }
      to   { box-shadow: 0 0 0 6px rgba(0,229,255,0.55), 0 0 40px rgba(0,229,255,0.85), 0 0 70px rgba(0,229,255,0.25), 0 4px 0 #001a22; }
    }

    /* Cursor movement pop */
    @keyframes cursor-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.2); }
      70%  { transform: scale(0.93); }
      100% { transform: scale(1); }
    }
    .key-square.cursor-moved { animation: cursor-pop 0.18s ease-out forwards; }

    /* Cursor leave ghost */
    @keyframes cursor-leave {
      from { box-shadow: 0 0 0 3px rgba(0,229,255,0.35), 0 0 20px rgba(0,229,255,0.25); }
      to   { box-shadow: 0 4px 0 #0a0a0a, 0 6px 16px rgba(0,0,0,0.6); }
    }
    .key-square.cursor-left { animation: cursor-leave 0.25s ease-out forwards; }

    /* Danger */
    .key-square.danger {
      background: #cc1111;
      border-color: #ff4444;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(255,51,51,0.3), 0 0 28px rgba(255,51,51,0.5), 0 4px 0 #440000;
      animation: pulse-red 0.5s ease-in-out infinite alternate;
    }

    /* Cursor on danger */
    .key-square.cursor.danger {
      animation: pulse-red-cursor 0.3s ease-in-out infinite alternate;
      box-shadow: 0 0 0 4px rgba(255,0,0,0.5), 0 0 40px rgba(255,0,0,0.7), 0 4px 0 #440000;
    }

    /* Critical (<20% remaining) */
    .key-square.danger.critical {
      animation: pulse-critical 0.15s ease-in-out infinite alternate !important;
    }
    @keyframes pulse-critical {
      from { box-shadow: 0 0 0 3px rgba(255,0,0,0.5), 0 0 20px rgba(255,0,0,0.6); border-color: #ff2222; }
      to   { box-shadow: 0 0 0 8px rgba(255,0,0,0.9), 0 0 50px rgba(255,0,0,1.0); border-color: #ff8888; }
    }

    /* Cursor on critical danger */
    .key-square.cursor.danger.cursor-danger-critical {
      animation: pulse-critical-cursor 0.1s ease-in-out infinite alternate !important;
    }
    @keyframes pulse-critical-cursor {
      from { box-shadow: 0 0 0 5px rgba(255,0,0,0.7), 0 0 40px rgba(255,0,0,0.8); }
      to   { box-shadow: 0 0 0 12px rgba(255,0,0,1.0), 0 0 80px rgba(255,255,0,0.6); }
    }

    /* Dead — sunken / spent look */
    .key-square.dead {
      background: #141414;
      border-color: #1e1e1e;
      color: #222;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.8), 0 1px 0 #000;
      animation: none;
    }

    /* Cursor on dead square */
    .key-square.cursor.dead {
      background: #003d4d;
      border-color: #00e5ff;
      border-width: 3px;
      color: #00e5ff;
      box-shadow: 0 0 0 4px rgba(0,229,255,0.35), 0 0 28px rgba(0,229,255,0.6), 0 4px 0 #001a22;
      animation: cursor-pulse 1s ease-in-out infinite alternate;
    }

    /* Flash to black */
    .key-square.flash-black {
      animation: flash-to-black 0.3s ease-out forwards !important;
    }

    /* Round complete flash (green) */
    @keyframes round-complete-flash {
      0%   { box-shadow: 0 0 0 0 rgba(0,255,150,0); }
      30%  { box-shadow: 0 0 0 4px rgba(0,255,150,0.55), 0 0 16px rgba(0,255,150,0.45); border-color: rgba(0,255,150,0.4); }
      100% { box-shadow: none; border-color: transparent; }
    }
    .key-square.round-complete-flash {
      animation: round-complete-flash 0.45s ease-out;
    }

    @keyframes pulse-red {
      from { background: #aa0f0f; box-shadow: 0 0 0 2px rgba(255,51,51,0.2), 0 0 16px rgba(255,51,51,0.4); }
      to   { background: #ff2222; box-shadow: 0 0 0 4px rgba(255,51,51,0.4), 0 0 32px rgba(255,51,51,0.6); }
    }
    @keyframes pulse-red-cursor {
      from { background: #aa0f0f; box-shadow: 0 0 0 4px rgba(255,0,0,0.4), 0 0 28px rgba(255,0,0,0.6); }
      to   { background: #ff3333; box-shadow: 0 0 0 7px rgba(255,0,0,0.6), 0 0 52px rgba(255,0,0,0.8); }
    }
    @keyframes flash-to-black {
      0%   { background: #ffffff; border-color: #ffffff; color: #fff; }
      30%  { background: #ff2222; border-color: #ff4444; }
      100% { background: #141414; border-color: #1e1e1e; color: #222; }
    }

    /* Countdown bar */
    .countdown-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 5px;
      width: 100%;
      background: #ff6622;
      border-radius: 0 0 8px 8px;
      transform-origin: left center;
      transform: scaleX(1);
      opacity: 0;
      transition: opacity 0.1s;
    }
    .key-square.danger .countdown-bar { opacity: 1; }

    /* ── Screen shake ── */
    @keyframes screen-shake {
      0%   { transform: translate(0,0) rotate(0deg); }
      10%  { transform: translate(-7px,-3px) rotate(-0.6deg); }
      20%  { transform: translate(7px,3px) rotate(0.6deg); }
      30%  { transform: translate(-5px,2px) rotate(-0.3deg); }
      40%  { transform: translate(5px,-2px) rotate(0.3deg); }
      50%  { transform: translate(-3px,-1px); }
      65%  { transform: translate(3px,1px); }
      80%  { transform: translate(-1px,0); }
      100% { transform: translate(0,0); }
    }
    .screen-shaking { animation: screen-shake 0.5s ease-out; }

    /* Death flash overlay */
    #death-flash {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 99;
      animation: death-flash-anim 0.45s ease-out forwards;
    }
    @keyframes death-flash-anim {
      0%   { background: rgba(255,0,0,0.55); }
      100% { background: rgba(255,0,0,0); }
    }

    /* ── Floating score pop ── */
    @keyframes score-pop-anim {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
      20%  { transform: translateX(-50%) translateY(-8px) scale(1.15); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-44px) scale(0.9); }
    }

    /* ── Overlay ── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    #overlay.visible {
      display: flex;
      animation: overlay-enter 0.35s ease-out;
    }
    @keyframes overlay-enter {
      from { opacity: 0; backdrop-filter: blur(0px); }
      to   { opacity: 1; backdrop-filter: blur(4px); }
    }

    #overlay h1 {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #00e5ff;
      text-shadow: 0 0 30px rgba(0,229,255,0.6);
      animation: title-drop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.05s both;
    }
    @keyframes title-drop {
      from { transform: translateY(-24px) scale(0.8); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }
    #overlay h1.dead-title {
      color: #ff3333;
      text-shadow: 0 0 30px rgba(255,51,51,0.6);
    }
    #overlay .subtitle {
      font-size: 16px; color: #777; line-height: 2; max-width: 380px;
    }
    #overlay .subtitle strong { color: #ccc; }
    #overlay .stats { font-size: 18px; color: #888; line-height: 2; }
    #overlay .stats strong { color: #00e5ff; font-size: 24px; }

    .new-best {
      font-size: 18px;
      color: #ffd700;
      letter-spacing: 4px;
      text-transform: uppercase;
      animation: new-best-shimmer 1.5s ease-in-out infinite;
    }
    @keyframes new-best-shimmer {
      0%   { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.4); transform: scale(1); }
      25%  { color: #fff7a0; text-shadow: 0 0 24px rgba(255,215,0,0.95), 0 0 44px rgba(255,215,0,0.5); transform: scale(1.14); }
      50%  { color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.6); transform: scale(1.05); }
      75%  { color: #ffe55c; text-shadow: 0 0 18px rgba(255,215,0,0.75); transform: scale(1.1); }
      100% { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.4); transform: scale(1); }
    }

    #overlay button {
      margin-top: 4px;
      padding: 14px 52px;
      font-size: 16px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      background: #00e5ff; color: #000;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(0,229,255,0.3);
    }
    #overlay button:hover { background: #33eeff; transform: scale(1.04); box-shadow: 0 6px 28px rgba(0,229,255,0.45); }
    #overlay button:active { transform: scale(0.98); }

    .key-hint { font-size: 12px; color: #333; letter-spacing: 2px; }

    /* Streak badge */
    #streak-badge {
      position: fixed;
      top: 18px; right: 24px;
      font-size: 13px; font-weight: 700;
      letter-spacing: 1px;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #streak-badge.visible { opacity: 1; }

    @keyframes streak-pop {
      0%   { transform: scale(1.6); }
      60%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    .streak-popping { animation: streak-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* Milestone flash overlay */
    #milestone-pop {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 98;
    }
    #milestone-pop span {
      font-size: 56px; font-weight: 900;
      letter-spacing: 6px; color: #fff;
      text-shadow: 0 0 30px rgba(255,255,255,0.6);
      opacity: 0;
    }
    @keyframes milestone-anim {
      0%   { opacity: 0; transform: scale(0.7); }
      20%  { opacity: 1; transform: scale(1.08); }
      55%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.05); }
    }
    .milestone-show { animation: milestone-anim 0.9s ease-out forwards !important; }

    #round-label {
      margin-top: 16px;
      font-size: 11px; color: #2a2a2a;
      letter-spacing: 3px; text-transform: uppercase;
      transition: color 0.3s;
      min-height: 16px;
    }
    #round-label.active { color: #3a3a3a; }
  </style>
</head>
<body>

  <div id="ui">
    <div class="hud-item">
      <span class="label">Round</span>
      <span class="value" id="hud-round">—</span>
    </div>
    <div class="hud-item">
      <span class="label">Score</span>
      <span class="value" id="hud-score">0</span>
    </div>
    <div class="hud-item">
      <span class="label">Best</span>
      <span class="value" id="hud-best">0</span>
      <button id="reset-best" title="Reset high score">✕</button>
    </div>
    <div class="hud-item">
      <span class="label">Rank</span>
      <span class="value" id="hud-tier" style="font-size:13px;letter-spacing:2px">—</span>
    </div>
  </div>

  <div id="grid-container"></div>

  <div id="round-label">KEY TRAP</div>

  <div id="streak-badge"></div>
  <div id="milestone-pop"><span></span></div>
  <div id="overlay"></div>

<script>
  // ── Constants ──────────────────────────────────────────────────────────────

  const GRID_KEYS = ['Q','W','E','R','T','Y','A','S','D','F','G','H','Z','X','C','V','B','N'];
  const STATE  = { NEUTRAL:'neutral', DANGER:'danger', DEAD:'dead' };
  const SCREEN = { TITLE:'title', PLAYING:'playing', GAMEOVER:'gameover' };

  const TIER_MAP = [
    { min:0,  label:'ROOKIE', color:'#666' },
    { min:4,  label:'SHARP',  color:'#aaa' },
    { min:8,  label:'REFLEX', color:'#00e5ff' },
    { min:13, label:'ELITE',  color:'#ffd700' },
    { min:19, label:'LEGEND', color:'#ff6622' },
  ];

  // ── Audio ──────────────────────────────────────────────────────────────────

  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq, type, duration, gainVal) {
    try {
      const ctx  = getAudioCtx();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(gainVal, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch(e) {}
  }

  function playSoundMove()        { playTone(900, 'sine',     0.06, 0.07); }
  function playSoundDanger()      { playTone(200, 'sawtooth', 0.09, 0.14); }
  function playSoundBlack()       { playTone(100, 'square',   0.14, 0.13); }
  function playSoundRoundClear()  {
    playTone(660, 'sine', 0.12, 0.18);
    setTimeout(() => playTone(880, 'sine', 0.1, 0.15), 80);
  }
  function playSoundDeath()       {
    playTone(180, 'sawtooth', 0.25, 0.4);
    setTimeout(() => playTone(100, 'sawtooth', 0.5, 0.3), 80);
  }
  function playSoundNewBest()     {
    playTone(660, 'sine', 0.12, 0.2);
    setTimeout(() => playTone(880, 'sine', 0.1, 0.2), 100);
    setTimeout(() => playTone(1100,'sine', 0.15, 0.25), 220);
  }

  // ── Game State ─────────────────────────────────────────────────────────────

  let screen        = SCREEN.TITLE;
  let cursorIndex   = 10;       // 'G'
  let roundComplete = false;
  let round         = 0;
  let score         = 0;
  let bestScore     = parseInt(localStorage.getItem('keyTrapBest') || '0', 10);
  let streakCount   = 0;
  let multiplier    = 1;
  let lastTier      = '';
  let rafId         = null;
  let pauseTimer    = null;
  let roundStartTime = 0;
  let squares       = [];
  let squareEls     = [];

  // ── Difficulty ─────────────────────────────────────────────────────────────

  function getDifficulty(r) {
    if (r === 1) return { redDuration: 1800, minRed: 1, maxRed: 2, pauseBetween: 900 };
    if (r <= 3)  return { redDuration: 1600, minRed: 2, maxRed: 3, pauseBetween: 800 };
    if (r <= 6)  return { redDuration: 1300, minRed: 2, maxRed: 4, pauseBetween: 700 };
    if (r <= 10) return { redDuration: 1100, minRed: 3, maxRed: 5, pauseBetween: 600 };
    const extra = r - 11;
    const dur   = Math.max(700, 1000 - extra * 30);
    const maxR  = Math.min(7, 5 + Math.floor(extra / 3));
    return { redDuration: dur, minRed: 3, maxRed: maxR, pauseBetween: 550 };
  }

  // ── DOM Build ──────────────────────────────────────────────────────────────

  function buildGrid() {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';
    squareEls = [];
    squares   = [];

    GRID_KEYS.forEach((key, i) => {
      squares.push({ key, state: STATE.NEUTRAL, redStartTime: 0, redDuration: 0, barEl: null, _timer: null });

      const el    = document.createElement('div');
      el.className = 'key-square';
      el.dataset.index = i;

      const label = document.createElement('span');
      label.className = 'key-label';
      label.textContent = key;

      const bar = document.createElement('div');
      bar.className = 'countdown-bar';
      squares[i].barEl = bar;

      el.appendChild(label);
      el.appendChild(bar);
      container.appendChild(el);
      squareEls.push(el);
    });
  }

  // ── CSS Sync ───────────────────────────────────────────────────────────────

  function applySquareClass(i) {
    const el = squareEls[i];
    const sq = squares[i];
    el.classList.remove('cursor', 'danger', 'dead', 'flash-black', 'critical', 'cursor-danger-critical');
    if (i === cursorIndex)         el.classList.add('cursor');
    if (sq.state === STATE.DANGER) el.classList.add('danger');
    if (sq.state === STATE.DEAD)   el.classList.add('dead');
  }

  // ── HUD ────────────────────────────────────────────────────────────────────

  function getTier(r) {
    for (let i = TIER_MAP.length - 1; i >= 0; i--) {
      if (r >= TIER_MAP[i].min) return TIER_MAP[i];
    }
    return TIER_MAP[0];
  }

  function updateHUD() {
    document.getElementById('hud-round').textContent = round || '—';
    document.getElementById('hud-score').textContent = score;
    document.getElementById('hud-best').textContent  = bestScore;

    if (round > 0) {
      const tier   = getTier(round);
      const tierEl = document.getElementById('hud-tier');
      if (tier.label !== lastTier) {
        tierEl.textContent  = tier.label;
        tierEl.style.color  = tier.color;
        lastTier = tier.label;
        tierEl.classList.remove('hud-tier-pop');
        void tierEl.offsetWidth;
        tierEl.classList.add('hud-tier-pop');
      } else {
        tierEl.textContent = tier.label;
        tierEl.style.color = tier.color;
      }
    }
  }

  function flashHudScore() {
    const el = document.getElementById('hud-score');
    el.classList.remove('hud-score-flash');
    void el.offsetWidth;
    el.classList.add('hud-score-flash');
  }

  // ── Score Pop ──────────────────────────────────────────────────────────────

  function showScorePop(base, bonus) {
    const ref  = document.getElementById('hud-score');
    const rect = ref.getBoundingClientRect();
    const pop  = document.createElement('div');
    const total = base + bonus;
    pop.style.cssText = `
      position:fixed;
      left:${rect.left + rect.width / 2}px;
      top:${rect.top - 4}px;
      transform:translateX(-50%);
      color:#00e5ff;
      font-size:${bonus > 10 ? '20px' : '15px'};
      font-weight:700;
      font-family:'Segoe UI',monospace;
      pointer-events:none;
      z-index:200;
      text-shadow:0 0 10px rgba(0,229,255,0.8);
      animation:score-pop-anim 0.7s ease-out forwards;
      white-space:nowrap;
    `;
    pop.textContent = multiplier > 1
      ? `+${total} ×${multiplier}`
      : (bonus > 0 ? `+${base} +${bonus}` : `+${base}`);
    document.body.appendChild(pop);
    setTimeout(() => pop.remove(), 700);
  }

  // ── Streak ─────────────────────────────────────────────────────────────────

  function updateStreak(survived) {
    if (!survived) {
      streakCount = 0;
      multiplier  = 1;
    } else {
      streakCount++;
      const prev = multiplier;
      multiplier = streakCount >= 10 ? 4 : streakCount >= 6 ? 3 : streakCount >= 3 ? 2 : 1;
      if (multiplier > prev) showStreakBump();
    }
    renderStreakBadge();
  }

  function renderStreakBadge() {
    const badge = document.getElementById('streak-badge');
    if (streakCount >= 3) {
      badge.textContent = `${streakCount} STREAK  ×${multiplier}`;
      badge.classList.add('visible');
    } else {
      badge.classList.remove('visible');
    }
  }

  function showStreakBump() {
    const badge = document.getElementById('streak-badge');
    badge.classList.remove('streak-popping');
    void badge.offsetWidth;
    badge.classList.add('streak-popping');
    playTone(1100, 'sine', 0.12, 0.18);
  }

  // ── Milestone ──────────────────────────────────────────────────────────────

  function showMilestone(text) {
    const pop  = document.getElementById('milestone-pop');
    const span = pop.querySelector('span');
    span.textContent = text;
    span.classList.remove('milestone-show');
    void span.offsetWidth;
    span.classList.add('milestone-show');
    playTone(880, 'sine', 0.15, 0.2);
    setTimeout(() => playTone(1100, 'sine', 0.12, 0.2), 120);
  }

  // ── Animation Loop ─────────────────────────────────────────────────────────

  function animationLoop(now) {
    squares.forEach((sq, idx) => {
      if (sq.state === STATE.DANGER && sq.redDuration > 0) {
        const elapsed  = now - sq.redStartTime;
        const progress = Math.max(0, 1 - elapsed / sq.redDuration);

        // Countdown bar color + scale
        sq.barEl.style.transform = `scaleX(${progress})`;
        const g = Math.floor(102 * progress);
        sq.barEl.style.background = `rgb(255,${g},34)`;

        // Critical state at <20%
        const el = squareEls[idx];
        if (progress < 0.2) {
          el.classList.add('critical');
          // Extra alarm if cursor is here
          if (idx === cursorIndex) el.classList.add('cursor-danger-critical');
        } else {
          el.classList.remove('critical', 'cursor-danger-critical');
        }
      } else {
        sq.barEl.style.transform = 'scaleX(0)';
        squareEls[idx].classList.remove('critical', 'cursor-danger-critical');
      }
    });
    rafId = requestAnimationFrame(animationLoop);
  }

  // ── Visual Difficulty Escalation ───────────────────────────────────────────

  function applyDifficultyAmbience(r) {
    const intensity = Math.min(1, (r - 1) / 20);
    const redGlow   = Math.floor(intensity * 55);
    const grid = document.getElementById('grid-container');
    grid.style.boxShadow    = `0 0 80px rgba(0,0,0,0.9), inset 0 0 ${redGlow}px rgba(180,0,0,${intensity * 0.18})`;
    grid.style.borderColor  = `rgb(${Math.floor(26 + intensity * 90)},${Math.floor(26 - intensity * 14)},${Math.floor(26 - intensity * 14)})`;
    document.body.style.backgroundColor = `rgb(${Math.floor(13 + intensity * 12)},${Math.floor(13 - intensity * 4)},${Math.floor(13 - intensity * 4)})`;
  }

  // ── Game Flow ──────────────────────────────────────────────────────────────

  function startGame() {
    screen        = SCREEN.PLAYING;
    round         = 0;
    score         = 0;
    streakCount   = 0;
    multiplier    = 1;
    lastTier      = '';
    cursorIndex   = 10; // 'G'
    roundComplete = false;

    // Reset ambience
    document.getElementById('grid-container').style.boxShadow  = '';
    document.getElementById('grid-container').style.borderColor = '';
    document.body.style.backgroundColor = '#0d0d0d';

    resetSquares();
    updateHUD();
    renderStreakBadge();

    const overlay = document.getElementById('overlay');
    overlay.classList.remove('visible');

    document.getElementById('round-label').textContent = '';
    document.getElementById('round-label').classList.add('active');

    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(animationLoop);

    setTimeout(beginRound, 600);
  }

  function resetSquares() {
    clearTimeout(pauseTimer);
    pauseTimer = null;
    squares.forEach((sq, i) => {
      if (sq._timer) { clearTimeout(sq._timer); sq._timer = null; }
      sq.state        = STATE.NEUTRAL;
      sq.redStartTime = 0;
      sq.redDuration  = 0;
      applySquareClass(i);
    });
  }

  function beginRound() {
    if (screen !== SCREEN.PLAYING) return;

    round++;
    roundComplete  = false;
    roundStartTime = performance.now();
    updateHUD();
    applyDifficultyAmbience(round);

    // Milestone announcements
    if ([5, 10, 15, 20, 25].includes(round)) showMilestone(`ROUND ${round}`);

    const diff  = getDifficulty(round);
    const count = diff.minRed + Math.floor(Math.random() * (diff.maxRed - diff.minRed + 1));

    const available = squares
      .map((_, i) => i)
      .filter(i => i !== cursorIndex && squares[i].state === STATE.NEUTRAL);

    // Always include the cursor square so the player must move every round
    const extras = shuffleArray(available).slice(0, count - 1);
    const chosen = [cursorIndex, ...extras];

    if (chosen.length === 0) {
      score += 10 * multiplier;
      updateHUD();
      roundComplete = true;
      updateStreak(true);
      pauseTimer = setTimeout(() => { revertDeadSquares(); setTimeout(beginRound, 300); }, diff.pauseBetween);
      return;
    }

    chosen.forEach(i => {
      squares[i].state        = STATE.DANGER;
      squares[i].redStartTime = performance.now();
      squares[i].redDuration  = diff.redDuration;
      applySquareClass(i);
      squares[i]._timer = setTimeout(() => turnBlack(i), diff.redDuration);
      playSoundDanger();
    });
  }

  function turnBlack(i) {
    if (screen !== SCREEN.PLAYING) return;
    const sq = squares[i];
    if (sq.state !== STATE.DANGER) return;

    if (cursorIndex === i) { triggerGameOver(i); return; }

    sq.state  = STATE.DEAD;
    sq._timer = null;

    const el = squareEls[i];
    el.classList.remove('cursor', 'danger', 'critical', 'cursor-danger-critical');
    el.classList.add('flash-black');
    playSoundBlack();

    setTimeout(() => {
      if (screen !== SCREEN.PLAYING) return;
      el.classList.remove('flash-black');
      applySquareClass(i);
      checkSequenceComplete();
    }, 300);
  }

  function checkSequenceComplete() {
    if (roundComplete) return;
    if (squares.some(sq => sq.state === STATE.DANGER)) return;
    if (squareEls.some(el => el.classList.contains('flash-black'))) return;

    roundComplete = true;

    // Round clear flash on surviving squares (skip cursor — its pulse must not be interrupted)
    squareEls.forEach((el, idx) => {
      if (idx !== cursorIndex && !el.classList.contains('dead') && !el.classList.contains('danger')) {
        el.classList.remove('round-complete-flash');
        void el.offsetWidth;
        el.classList.add('round-complete-flash');
        setTimeout(() => el.classList.remove('round-complete-flash'), 460);
      }
    });
    playSoundRoundClear();

    // Score
    const elapsed   = performance.now() - roundStartTime;
    const diff      = getDifficulty(round);
    const survivalSpeed = Math.max(0, 1 - elapsed / diff.redDuration);
    const roundMult     = 1 + round * 0.15;
    const timeBonus     = Math.floor(survivalSpeed * 20 * roundMult);
    const basePoints    = 10;
    const earned        = (basePoints + timeBonus) * multiplier;
    score += earned;

    updateStreak(true);
    showScorePop(basePoints * multiplier, timeBonus * multiplier);
    flashHudScore();
    updateHUD();

    clearTimeout(pauseTimer);
    pauseTimer = setTimeout(() => {
      revertDeadSquares();
      setTimeout(beginRound, 300);
    }, diff.pauseBetween);
  }

  function revertDeadSquares() {
    squares.forEach((sq, i) => {
      if (sq.state === STATE.DEAD) {
        sq.state = STATE.NEUTRAL;
        applySquareClass(i);
      }
    });
  }

  // ── Game Over ──────────────────────────────────────────────────────────────

  function triggerGameOver(fatalIndex) {
    screen = SCREEN.GAMEOVER;

    cancelAnimationFrame(rafId);
    rafId = null;
    clearTimeout(pauseTimer);
    pauseTimer = null;
    squares.forEach(sq => { if (sq._timer) { clearTimeout(sq._timer); sq._timer = null; } });

    updateStreak(false);
    playSoundDeath();

    // Screen shake
    document.body.classList.remove('screen-shaking');
    void document.body.offsetWidth;
    document.body.classList.add('screen-shaking');
    setTimeout(() => document.body.classList.remove('screen-shaking'), 500);

    // Red flash overlay
    const flash = document.getElementById('death-flash');
    flash.style.animation = 'none';
    void flash.offsetWidth;
    flash.style.animation = '';

    // Fatal square highlight
    if (fatalIndex !== undefined) {
      const el = squareEls[fatalIndex];
      el.style.transition = 'none';
      el.style.background = '#ff0000';
      el.style.boxShadow  = '0 0 0 6px rgba(255,0,0,0.6), 0 0 60px #ff0000';
    }

    const isNewBest = score > bestScore;
    if (isNewBest) {
      bestScore = score;
      localStorage.setItem('keyTrapBest', bestScore);
      setTimeout(playSoundNewBest, 300);
    }
    updateHUD();
    setTimeout(() => showOverlay('gameover'), 480);
  }

  // ── Input ──────────────────────────────────────────────────────────────────

  document.addEventListener('keydown', e => {
    if (screen === SCREEN.GAMEOVER || screen === SCREEN.TITLE) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startGame(); }
      return;
    }
    if (screen !== SCREEN.PLAYING) return;

    const key = e.key.toUpperCase();
    const targetIndex = GRID_KEYS.indexOf(key);
    if (targetIndex === -1) return;
    e.preventDefault();
    if (targetIndex === cursorIndex) return;

    const prev  = cursorIndex;
    cursorIndex = targetIndex;
    playSoundMove();

    // Cursor-leave ghost on old square
    squareEls[prev].classList.remove('cursor-left');
    void squareEls[prev].offsetWidth;
    squareEls[prev].classList.add('cursor-left');
    setTimeout(() => squareEls[prev].classList.remove('cursor-left'), 260);

    applySquareClass(prev);
    applySquareClass(cursorIndex);

    // Cursor-pop on new square — remove class after animation so cursor-pulse resumes
    const movedIdx = cursorIndex;
    squareEls[movedIdx].classList.remove('cursor-moved');
    void squareEls[movedIdx].offsetWidth;
    squareEls[movedIdx].classList.add('cursor-moved');
    setTimeout(() => squareEls[movedIdx].classList.remove('cursor-moved'), 200);
  });

  // ── Overlay ────────────────────────────────────────────────────────────────

  function showOverlay(mode) {
    const overlay = document.getElementById('overlay');
    overlay.classList.remove('visible');
    void overlay.offsetWidth;

    if (mode === 'title') {
      overlay.innerHTML = `
        <h1>KEY TRAP</h1>
        <div class="subtitle">
          Squares flash <span style="color:#ff4444;font-weight:700">red</span> then go
          <span style="color:#555;font-weight:700;background:#222;border-radius:3px;padding:0 4px">black</span>.<br>
          <strong>Don't be on a square when it goes black.</strong><br>
          Press a key to jump your cursor to that square.
        </div>
        <button id="startBtn">PLAY</button>
        <div class="key-hint">Q W E R T Y &nbsp;·&nbsp; A S D F G H &nbsp;·&nbsp; Z X C V B N</div>
        <div class="key-hint" style="margin-top:-6px">Enter or Space to start</div>
      `;
    } else {
      const isNewBest = score >= bestScore && score > 0;
      const tier = getTier(round);
      overlay.innerHTML = `
        <h1 class="dead-title">DEAD</h1>
        <div class="stats">
          Round <strong>${round}</strong> &nbsp;·&nbsp;
          <span style="color:${tier.color};font-size:14px;font-weight:700">${tier.label}</span><br>
          Score <strong>${score}</strong>
          ${streakCount >= 3 ? `<br><span style="color:#ffd700;font-size:13px">Peak Streak: ${streakCount}</span>` : ''}
        </div>
        ${isNewBest
          ? '<div class="new-best">✦ New Best ✦</div>'
          : `<div style="color:#444;font-size:14px;letter-spacing:1px">Best: ${bestScore}</div>`}
        <button id="startBtn">AGAIN</button>
        <div class="key-hint">Enter or Space to retry</div>
      `;
    }

    overlay.classList.add('visible');
    document.getElementById('startBtn').addEventListener('click', startGame);
  }

  // ── Utilities ──────────────────────────────────────────────────────────────

  function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── Init ───────────────────────────────────────────────────────────────────

  window.addEventListener('DOMContentLoaded', () => {
    buildGrid();
    updateHUD();
    applySquareClass(10);
    showOverlay('title');

    document.getElementById('reset-best').addEventListener('click', () => {
      bestScore = 0;
      localStorage.removeItem('keyTrapBest');
      updateHUD();
    });
  });
</script>
</body>
